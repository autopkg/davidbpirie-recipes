Description: |
  Downloads and modifies the Audinate Dante Virtual Soundcard
  installer to enable silent installation by removing AppleScript
  dialogs from the pre and postinstall scripts, then uploads the
  package to Jamf Pro and deletes the package.


  Configure script paths:
  Set PREINSTALL_SCRIPT_PATH and POSTINSTALL_SCRIPT_PATH in your override
  These can reference the original parent recipe's scripts but must be configurable


  Add required repositories:

  For checksum verification
  autopkg repo-add hjuutilainen-recipes

  For permission management
  autopkg repo-add jessepeterson-recipes</string>


  JSS_URL, API_USERNAME, and API_PASSWORD, and for non-cloud instances
  SMB_URL, SMB_USERNAME and SMB_PASSWORD, are expected to be populated
  in your AutoPkg preferences, override Input variables, or by
  command-line keys.

Identifier: com.github.davidbpirie.jamf-upload.AudinateDanteVirtualSoundcard
ParentRecipe: com.github.dataJAR-recipes.pkg.Audinate Dante Virtual Soundcard
MinimumVersion: 2.3.0

Input:
  NAME: AudinateDanteVirtualSoundcard
  JAMF_CATEGORY: Music
  JAMF_PKG_NAME: '%NAME%'
  JAMF_PKG_INFO: Dante Virtual Soundcard turns your computer into a Dante-powered workstation, seamlessly integrating your PC or Mac with Dante audio devices on your network. Instantly connect to record, process and playout using any audio application and any combination of Dante-enabled devices.
  JAMF_PKG_NOTES: Created and uploaded by AutoPkg
  JAMF_PKG_OS_REQUIREMENTS: ''
  JAMF_PKG_PRIORITY: '10'
  JAMF_PKG_REBOOT_REQUIRED: 'False'
  JAMF_PKG_REPLACE: 'False'
  JAMF_PKG_REPLACE_METADATA: 'False'
  JAMF_PKG_REQUIRED_PROCESSOR: None
  JAMF_PKG_SEND_NOTIFICATION: 'False'
  JAMF_PKG_SUFFIX: 'pkg'

Process:
  - Processor: com.github.grahampugh.jamf-upload.processors/JamfPackageUploader
    Arguments:
      pkg_name: '%JAMF_PKG_NAME%-%version%.%JAMF_PKG_SUFFIX%'
      pkg_path: '%pkg_path%'
      pkg_category: '%JAMF_CATEGORY%'
      pkg_info: '%JAMF_PKG_INFO%'
      pkg_notes: '%JAMF_PKG_NOTES%'
      pkg_priority: '%JAMF_PKG_PRIORITY%'
      reboot_required: '%JAMF_PKG_REBOOT_REQUIRED%'
      os_requirements: '%JAMF_PKG_OS_REQUIREMENTS%'
      required_processor: '%JAMF_PKG_REQUIRED_PROCESSOR%'
      send_notification: '%JAMF_PKG_SEND_NOTIFICATION%'
      replace_pkg: '%JAMF_PKG_REPLACE%'
      replace_pkg_metadata: '%JAMF_PKG_REPLACE_METADATA%'

  - Processor: PathDeleter
    Arguments:
      path_list:
        - '%pkg_path%'
