Description: |
  Creates a package that installs all required Cisco Secure Client pkgs
  taken from inside the Cisco Secure Client headend deployment package,
  then uploads the package to Jamf Pro.

  As of CSC v5.1.16, Cisco now recommends using the headend deployment
  package, rather than the pre-deployment package, when deploying
  Cisco Secure Client to macOS devices via MDM.
  See https://community.cisco.com/t5/security-knowledge-base/deploying-cisco-secure-client-on-macos-via-mdm-emm/ta-p/5546310

  Package source PKG must be provided either as Input Variable PKG or
  via the -p parameter eg:
  autopkg run CiscoSecureClientHeadend.pkg -p "path/to/cisco-secure-client-macos-5.1.17.3382-webdeploy-k9.pkg"

  csc_modules is the list of modules you would like installed.
  Default is just the core-vpn module, which is required.
  At time of writing, the other modules available are:
    core-vpn
    dart
    iseposture
    nvm
    posture
    umprella
    zta

  csc_te_agent_connectstring if non-empty will be registered by running:
    /Applications/Cisco/Cisco\ Secure\ Client\ -\ ThousandEyes\ Endpoint\ Agent.app/Contents/MacOS/csc_te_agent --register '%CSC_TE_AGENT_CONNECTIONSTRING%'

  csc_disable_launchagent if set the launchagent will be disabled for the
  logged-in user (if any) by running:
    /Applications/Cisco/Cisco\ Secure\ Client.app/Contents/MacOS/Cisco\ Secure\ Client disableAutoStart

  PKG_ID is the ID of the generated package.

  PROFILES is a path to a folder containing profile xml files for the desired
  services. An example is included with this recipe, with a single example.xml
  file under vpn. See the administrator guide at
  https://www.cisco.com/c/en/us/support/security/secure-client-5/model.html
  for more details on generating profile xml files.

  Additionally, support for installing a VPN management tunnel profile
  (VpnMgmtTunProfile.xml) is handled if
  %PROFILES%/vpn/MgmtTun/VpnMgmtTunProfile.xml is found

  Note that the webdeploy source file, despite the pkg suffix, is not
  a macOS package, but a zip archive. The only pkg that has the
  signature checked is core-vpn. Ensure you trust the source of the
  webdeploy "pkg", as there is potential for an attacker to modify
  the contents of one of the other module pkgs.


  Largely inspired (ie plagiarised with <3) from Graham Pugh's Cisco
  AnyConnect recipe com.github.grahampugh.recipes.pkg.CiscoAnyConnect.

  Package source DMG must be provided either as Input Variable PKG or
  via the -p parameter eg:
  autopkg run CiscoSecureClient.jamf-upload -p "path/to/predeploy.dmg"

  SRC_PKG_NAME is the name of the pkg inside the DMG, which is usually
  the default value Cisco Secure Client.pkg

  PKG_ID is the ID of the generated package.

  desired_choices is the list of pkg components you would like installed.
  Default is just the VPN component. To find all available choices, run:
  installer -showChoicesXML -pkg path/to/Cisco\ Secure\ Client.pkg

  PROFILES should be a path to a folder containing profile xml files for
  the desired services. An example is included with this recipe, with a
  single example.xml file under vpn. See the administrator guide at
  https://www.cisco.com/c/en/us/support/security/secure-client-5/model.html
  for more details on generating profile xml files.

  JSS_URL, API_USERNAME, and API_PASSWORD, and for non-cloud instances
  SMB_URL, SMB_USERNAME and SMB_PASSWORD, are expected to be populated
  in your AutoPkg preferences, override Input variables, or by
  command-line keys.

Identifier: com.github.davidbpirie.jamf-upload.CiscoSecureClientHeadend
MinimumVersion: 2.3.0
ParentRecipe: com.github.davidbpirie.pkg.CiscoSecureClientHeadend

Input:
  NAME: Cisco Secure Client
  csc_modules:
    - core-vpn
  csc_te_agent_connectstring: ''
  csc_disable_launchagent: 'false'
  PKG_ID: com.github.davidbpirie.CiscoSecureClientHeadend
  PROFILES: '%RECIPE_DIR%/CiscoSecureClientProfiles'
  JAMF_CATEGORY: Utilities
  JAMF_PKG_NAME: '%NAME%'
  JAMF_PKG_INFO: 'Secure Client harnesses the powerful industry-leading AnyConnect VPN/ZTNA and helps IT and security professionals manage dynamic and scalable endpoint security agents in a unified view.'
  JAMF_PKG_NOTES: 'Generated and uploaded by AutoPkg'
  JAMF_PKG_PRIORITY: '10'
  JAMF_PKG_REBOOT_REQUIRED: 'False'
  JAMF_PKG_OS_REQUIREMENTS: ''
  JAMF_PKG_REQUIRED_PROCESSOR: None
  JAMF_PKG_SEND_NOTIFICATION: 'False'
  JAMF_PKG_REPLACE: 'False'
  JAMF_PKG_REPLACE_METADATA: 'False'

Process:
  - Processor: com.github.grahampugh.jamf-upload.processors/JamfPackageUploader
    Arguments:
      pkg_name: '%JAMF_PKG_NAME%-%version%.pkg'
      pkg_category: '%JAMF_CATEGORY%'
      pkg_info: '%JAMF_PKG_INFO%'
      pkg_notes: '%JAMF_PKG_NOTES%'
      pkg_priority: '%JAMF_PKG_PRIORITY%'
      reboot_required: '%JAMF_PKG_REBOOT_REQUIRED%'
      os_requirements: '%JAMF_PKG_OS_REQUIREMENTS%'
      required_processor: '%JAMF_PKG_REQUIRED_PROCESSOR%'
      send_notification: '%JAMF_PKG_SEND_NOTIFICATION%'
      replace_pkg: '%JAMF_PKG_REPLACE%'
      replace_pkg_metadata: '%JAMF_PKG_REPLACE_METADATA%'

  - Processor: PathDeleter
    Arguments:
      path_list:
        - '%pkg_path%'
