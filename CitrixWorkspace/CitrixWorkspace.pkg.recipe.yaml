Description: |
  Downloads the latest Citrix Workspace disk image, extracts the version,
  then copies the pkg.
Identifier: com.github.davidbpirie.pkg.CitrixWorkspace
MinimumVersion: 2.3.0
ParentRecipe: com.github.davidbpirie.download.CitrixWorkspace

Input:
  NAME: CitrixWorkspace
  SRC_PAYLOAD_PKG_NAME: com.citrix.ICAClient.pkg

Process:
  - Processor: DeprecationWarning
    Arguments:
      warning_message: Consider switching to the recipe in the rtrouton-recipes repo. This recipe is deprecated and will be removed in the future.

  - Processor: FlatPkgUnpacker
    Arguments:
      flat_pkg_path: '%pathname%/%dmg_found_filename%'
      destination_path: '%RECIPE_CACHE_DIR%/unpack'

  - Processor: PkgPayloadUnpacker
    Arguments:
      pkg_payload_path: '%RECIPE_CACHE_DIR%/unpack/%SRC_PAYLOAD_PKG_NAME%/Payload'
      destination_path: '%RECIPE_CACHE_DIR%/payload'
      purge_destination: True

  - Processor: PlistReader
    Arguments:
      info_path: '%RECIPE_CACHE_DIR%/payload/Applications/Citrix Workspace.app'

  - Processor: PkgCopier
    Arguments:
      source_pkg: '%pathname%/%dmg_found_filename%'
      pkg_path: '%RECIPE_CACHE_DIR%/%NAME%-%version%.pkg'

  - Processor: PathDeleter
    Arguments:
      path_list:
        - '%RECIPE_CACHE_DIR%/unpack'
        - '%RECIPE_CACHE_DIR%/payload'
